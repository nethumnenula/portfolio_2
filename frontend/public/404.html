<html>
  <head>

    <title>Nethum - Portfolio</title>
    <script type="text/javascript">
      
      const path = window.location.pathname;
      
      
      let newPath = path.replace('/portfolio_2', '');
      
      
      if (!newPath || newPath === '') {
        newPath = '/';
      }
      
      
      window.location.href = '/portfolio_2' + newPath + window.location.search;
    </script>
  </head>
