<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nethum - Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      
      (function() {
        var base = '/portfolio_2';
        var pathname = window.location.pathname;

        // If the request was for a static asset (contains a dot), let it 404 normally
        if (pathname.indexOf('.') !== -1) return;

        fetch(base + '/index.html')
          .then(function(resp) { return resp.text(); })
          .then(function(html) {
            // Inject a <base> tag so relative assets resolve correctly
            html = html.replace('<head>', '<head><base href="' + base + '/">');

            // Replace the current document with the app's index.html
            history.replaceState(null, '', pathname + location.search);
            document.open();
            document.write(html);
            document.close();
          })
          .catch(function(err) {
            console.error('Failed to fetch index.html for SPA fallback', err);
          });
      })();
    </script>
  </head>
  <body>
    <p>Loading…</p>
  </body>
</html>
